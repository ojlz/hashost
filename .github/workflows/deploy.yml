name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via PythonAnywhere API
        env:
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_TOKEN }}
          PA_USER: hashost
        run: |
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/always_on/${PA_USER}.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${PA_TOKEN}"
          echo "Deploy concluido!"
