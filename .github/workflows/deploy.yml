name: Deploy to PythonAnywhere

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via PythonAnywhere API
        env:
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_TOKEN }}
          PA_USER: ${{ secrets.PYTHONANYWHERE_USER }}
        run: |
          # Step 1: Create console and run git pull + pip install
          RESPONSE=$(curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/consoles/" \
            -H "Authorization: Token ${PA_TOKEN}" \
            -d "command=cd ~/${PA_USER} && git pull origin master && pip3 install --user -r requirements.txt")

          echo "Console response: ${RESPONSE}"

          # Step 2: Wait for commands to finish
          sleep 10

          # Step 3: Reload the web app
          RELOAD=$(curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/webapps/${PA_USER}.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${PA_TOKEN}")

          echo "Reload response: ${RELOAD}"
          echo "Deploy concluido!"
