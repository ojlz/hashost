name: Deploy to PythonAnywhere

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via PythonAnywhere API
        env:
          PA_TOKEN: ${{ secrets.PYTHONANYWHERE_TOKEN }}
          PA_USER: ${{ secrets.PYTHONANYWHERE_USER }}
        run: |
          # Pull latest code
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/consoles/" \
            -H "Authorization: Token ${PA_TOKEN}" \
            -d 'command=cd ~/'${PA_USER}' && git pull origin master && pip3 install --user -r requirements.txt'

          sleep 5

          # Reload the web app
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/webapps/${PA_USER}.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${PA_TOKEN}"

          echo "Deploy concluido!"
