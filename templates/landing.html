<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .hero-tagline {
      color: var(--text2);
      font-size: 16px;
      margin-bottom: 32px;
    }
    .hero-buttons {
      display: flex;
      gap: 12px;
    }
    .features {
      padding: 80px 24px;
    }
    .features-title {
      text-align: center;
      font-size: 20px;
      margin-bottom: 40px;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .feature-icon {
      font-size: 28px;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .feature-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .feature-desc {
      color: var(--text2);
      font-size: 13px;
      line-height: 1.6;
    }
    footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      color: var(--text2);
      font-size: 13px;
    }
    @media (max-width: 640px) {
      .features-grid {
        grid-template-columns: 1fr;
      }
      .hero-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div style="margin-bottom:24px">
      <span class="glitch logo" data-text="HHost" style="font-size:48px;font-weight:700;letter-spacing:-0.04em">
        <span style="color:var(--accent)">H</span>Host
      </span>
    </div>
    <p class="hero-tagline">Armazenamento e compartilhamento de arquivos</p>
    <div class="hero-buttons stagger-children">
      <a href="/login" class="btn btn-primary">Entrar</a>
      <a href="/signup" class="btn btn-ghost">Criar conta</a>
    </div>
  </div>

  <section class="features reveal">
    <h2 class="features-title">Funcionalidades</h2>
    <div class="features-grid stagger-children">
      <div class="card hover-lift" style="text-align:center;padding:32px">
        <div class="feature-icon">&#9650;</div>
        <div class="feature-title">Envio rápido</div>
        <div class="feature-desc">Upload de arquivos com drag and drop</div>
      </div>
      <div class="card hover-lift" style="text-align:center;padding:32px">
        <div class="feature-icon">&#9830;</div>
        <div class="feature-title">Segurança</div>
        <div class="feature-desc">Arquivos protegidos com validação MIME</div>
      </div>
      <div class="card hover-lift" style="text-align:center;padding:32px">
        <div class="feature-icon">&#9733;</div>
        <div class="feature-title">Compartilhamento</div>
        <div class="feature-desc">Links seguros para compartilhar</div>
      </div>
    </div>
  </section>

  <footer>
    HashHost
  </footer>

  <script src="/static/wavy-canvas.js"></script>
  <script src="/static/animations.js"></script>
</body>
</html>
