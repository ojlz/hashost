<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Pastebin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .paste-textarea {
      height: 400px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.5;
    }
    .result {
      margin-top: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }
    .link-box {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .link-box input {
      flex: 1;
      font-family: monospace;
      font-size: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container" style="max-width:720px">
    <div class="header">
      <a href="/tools" class="logo">H<span>Host</span></a>
      <a href="/tools" class="btn btn-ghost">Voltar</a>
    </div>

    <div class="card">
      <h2 style="margin-bottom:20px">Pastebin</h2>
      <form id="pasteForm">
        <div class="form-group">
          <label>Conteudo</label>
          <textarea name="content" class="paste-textarea" placeholder="Cole o codigo ou texto aqui..." required></textarea>
        </div>
        <div class="grid">
          <div class="form-group">
            <label>Titulo</label>
            <input type="text" name="title" placeholder="Titulo opcional">
          </div>
          <div class="form-group">
            <label>Linguagem</label>
            <select name="syntax">
              <option value="text">Texto</option>
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="sql">SQL</option>
              <option value="bash">Bash</option>
              <option value="json">JSON</option>
              <option value="xml">XML</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Expirar em (horas, 0 = nunca)</label>
          <input type="number" name="expiry" value="0" min="0">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Criar paste</button>
      </form>

      <div class="result" id="result">
        <p style="font-size:13px;color:var(--text2)">Paste criado:</p>
        <div class="link-box">
          <input type="text" id="pasteUrl" readonly>
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('pasteUrl').value)">Copiar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('pasteForm').addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new URLSearchParams(new FormData(e.target));
      const r = await fetch('/tools/pastebin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: fd
      });
      const d = await r.json();
      if (d.paste_url) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('pasteUrl').value = d.paste_url;
      } else {
        alert(d.error);
      }
    });
  </script>
</body>
</html>
