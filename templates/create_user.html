<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Novo usuário</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container" style="max-width:480px">
    <div class="header">
      <a href="/admin" class="logo glitch" data-text="HHost">H<span>Host</span></a>
      <a href="/admin" class="btn btn-ghost">Voltar</a>
    </div>

    <div class="card reveal-scale">
      <h2 style="margin-bottom:24px">Novo usuário</h2>
      {% if error %}
      <div class="error" style="margin-bottom:16px">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Nome de usuário</label>
          <input type="text" name="username" required maxlength="50" placeholder="3-16 caracteres, apenas letras, numeros e _">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" name="password" required minlength="6" placeholder="6-32 caracteres">
        </div>

        <h2 style="margin:24px 0 16px;font-size:16px">Permissoes</h2>
        <div class="grid" style="grid-template-columns:1fr 1fr">
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" name="is_admin" id="is_admin"> Admin
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" name="can_create_invites" id="can_create_invites"> Criar invites
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" name="can_change_title" checked> Alterar título
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" name="can_use_hashbin" id="can_use_hashbin"> HashBin
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" name="can_change_password" checked> Alterar senha
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer">
            <input type="checkbox" name="can_choose_embed_color" checked> Cor do embed
          </label>
        </div>

        <div id="inviteCountGroup" style="display:none;margin-top:16px">
          <div class="form-group">
            <label>Limite de invites (-1 = ilimitado)</label>
            <input type="number" name="invite_count" value="0" min="-1">
          </div>
        </div>

        <div class="form-group" style="margin-top:16px">
          <label>Vida útil dos arquivos</label>
          <select name="file_lifetime" multiple size="4" style="height:auto">
            {% for opt in file_lifetime_options %}
            <option value="{{ opt.value }}" {% if opt.value == '0' %}selected{% endif %}>{{ opt.label }}</option>
            {% endfor %}
          </select>
          <p style="color:var(--text2);font-size:11px;margin-top:4px">Segure Ctrl para selecionar múltiplas opções</p>
        </div>

        <div id="hashbinLifetimeGroup" style="display:none;margin-top:16px">
          <div class="form-group">
            <label>Vida útil do HashBin</label>
            <select name="hashbin_lifetime" multiple size="4" style="height:auto">
              {% for opt in file_lifetime_options %}
              <option value="{{ opt.value }}" {% if opt.value == '0' %}selected{% endif %}>{{ opt.label }}</option>
              {% endfor %}
            </select>
            <p style="color:var(--text2);font-size:11px;margin-top:4px">Segure Ctrl para selecionar múltiplas opções</p>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:24px">Criar usuário</button>
      </form>
    </div>
  </div>

  <script>
    const adminCb = document.getElementById('is_admin');
    const invitesCb = document.getElementById('can_create_invites');
    const hashbinCb = document.getElementById('can_use_hashbin');
    const inviteCountGroup = document.getElementById('inviteCountGroup');
    const hashbinLifetimeGroup = document.getElementById('hashbinLifetimeGroup');

    function updateAdmin() {
      if (adminCb.checked) {
        invitesCb.checked = true;
        invitesCb.disabled = true;
        hashbinCb.checked = true;
        hashbinCb.disabled = true;
        inviteCountGroup.style.display = 'none';
        hashbinLifetimeGroup.style.display = 'none';
      } else {
        invitesCb.disabled = false;
        hashbinCb.disabled = false;
        updateInvites();
        updateHashbin();
      }
    }

    function updateInvites() {
      inviteCountGroup.style.display = invitesCb.checked ? 'block' : 'none';
    }

    function updateHashbin() {
      hashbinLifetimeGroup.style.display = hashbinCb.checked ? 'block' : 'none';
    }

    adminCb.addEventListener('change', updateAdmin);
    invitesCb.addEventListener('change', updateInvites);
    hashbinCb.addEventListener('change', updateHashbin);
    updateAdmin();
  </script>

  <script src="/static/wavy-canvas.js"></script>
  <script src="/static/animations.js"></script>
</body>
</html>
