<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .tool-card {
      padding: 32px;
      text-align: center;
      transition: border-color 0.15s;
      cursor: pointer;
    }
    .tool-card:hover { border-color: var(--accent); }
    .tool-icon { font-size: 40px; margin-bottom: 16px; color: var(--text2); }
    .tool-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .tool-desc { color: var(--text2); font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/" class="logo">H<span>Host</span></a>
      <a href="/" class="btn btn-ghost">Voltar</a>
    </div>

    <h1 style="margin-bottom:8px">Tools</h1>
    <p style="color:var(--text2);margin-bottom:24px;font-size:14px">Ferramentas para uso diario.</p>

    <div class="grid">
      <a href="/tools/shortener" class="card tool-card" style="text-decoration:none;color:inherit">
        <div class="tool-icon">/</div>
        <div class="tool-title">Encurtador de links</div>
        <div class="tool-desc">Encurte URLs longas em links curtos e rastreaveis.</div>
      </a>
      <a href="/tools/pastebin" class="card tool-card" style="text-decoration:none;color:inherit">
        <div class="tool-icon">{ }</div>
        <div class="tool-title">Pastebin</div>
        <div class="tool-desc">Cole e compartilhe trechos de codigo ou texto.</div>
      </a>
    </div>
  </div>
</body>
</html>
