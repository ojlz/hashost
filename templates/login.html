<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login - ImageHost Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--accent:#58a6ff;--accent2:#1f6feb;--text:#f0f6fc;--text2:#8b949e;--success:#238636;--danger:#da3633;--border:#30363d}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-container{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
        .logo{text-align:center;margin-bottom:32px}
        .logo i{font-size:48px;color:var(--accent);margin-bottom:16px;display:block}
        .logo h1{font-size:24px;font-weight:700;color:var(--text)}
        .logo p{color:var(--text2);font-size:14px;margin-top:8px}
        .form-group{margin-bottom:20px}
        label{display:block;margin-bottom:8px;color:var(--text);font-weight:500;font-size:14px}
        .input-group{position:relative}
        .input-group i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2)}
        input{width:100%;padding:12px 16px 12px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
        input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,0.1)}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(88,166,255,0.3)}
        .error{background:rgba(218,54,51,0.1);border:1px solid var(--danger);border-radius:8px;padding:12px;color:var(--danger);margin-top:16px;font-size:14px;display:flex;align-items:center;gap:8px}
        .back-link{text-align:center;margin-top:24px}
        .back-link a{color:var(--accent);text-decoration:none;font-size:14px;display:inline-flex;align-items:center;gap:6px}
        .back-link a:hover{text-decoration:underline}
        .features{margin-top:24px;padding-top:24px;border-top:1px solid var(--border)}
        .feature{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:14px;color:var(--text2)}
        .feature i{color:var(--accent);width:16px}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-cloud-upload-alt"></i>
            <h1>ImageHost Premium</h1>
            <p>Sistema avançado de hospedagem</p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label>Usuário</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i>
                Entrar
            </button>
        </form>

        {% if error %}
        <div class="error">
            <i class="fas fa-exclamation-triangle"></i>
            {{ error }}
        </div>
        {% endif %}

        <div class="features">
            <div class="feature">
                <i class="fas fa-infinity"></i>
                Uploads permanentes para usuários logados
            </div>
            <div class="feature">
                <i class="fas fa-video"></i>
                Suporte a vídeos e áudios (premium)
            </div>
            <div class="feature">
                <i class="fas fa-palette"></i>
                Embeds personalizados para Discord
            </div>
            <div class="feature">
                <i class="fas fa-link"></i>
                URLs customizadas
            </div>
        </div>

        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Voltar ao início</a>
        </div>
    </div>
</body>
</html>
