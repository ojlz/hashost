<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>{{ title }} - Info</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    @media (max-width: 768px) {
      .info-grid { grid-template-columns: 1fr; }
    }
    .info-item {
      background: var(--surface2);
      padding: 16px;
      border-radius: 8px;
      border-left: 3px solid {{ embed_color }};
    }
    .info-label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .info-value { font-size: 15px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/dashboard" class="logo glitch" data-text="HHost">H<span>Host</span></a>
      <a href="/s/{{ short_id }}" class="btn btn-ghost">Voltar</a>
    </div>

    <div class="card reveal">
      <h1 style="margin-bottom:16px">{{ title }}</h1>

      <div style="text-align:center;margin:20px 0">
        {{ media_html | safe }}
      </div>

      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Arquivo</div>
          <div class="info-value">{{ original_filename }}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Enviado por</div>
          <div class="info-value">{{ username }}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Data</div>
          <div class="info-value">{{ upload_date }}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Tamanho</div>
          <div class="info-value">{{ file_size }}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Visualizacoes</div>
          <div class="info-value">{{ views }}</div>
        </div>
        <div class="info-item">
          <div class="info-label">Tipo</div>
          <div class="info-value">{{ file_type }}</div>
        </div>
      </div>
    </div>
  </div>
</body>
<script src="/static/wavy-canvas.js"></script>
<script src="/static/animations.js"></script>
</html>
