<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:image" content="{{ proxy_url }}">
  <meta property="og:image:width" content="{{ width }}">
  <meta property="og:image:height" content="{{ height }}">
  <meta name="theme-color" content="{{ embed_color }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ proxy_url }}">
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:20px;background:#000;color:#ededed;text-align:center;font-family:'JetBrains Mono',monospace">
  <h1 style="font-size:24px;font-weight:600;margin-bottom:16px;color:#ededed">{{ title }}</h1>
  <p style="color:#888;margin:16px 0;font-size:14px">{{ description }}</p>

  {{ media_html | safe }}

  <div style="margin-top:24px">
    <a href="{{ info_link }}" style="background:#1a1a1a;color:#ededed;padding:10px 20px;border-radius:8px;text-decoration:none;margin:0 8px;font-size:14px;border:1px solid #333">Info</a>
    <a href="{{ raw_link }}" style="background:#0070f3;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;margin:0 8px;font-size:14px">Link direto</a>
  </div>
</body>
</html>
