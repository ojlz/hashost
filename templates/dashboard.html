<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Painel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .upload-zone {
      border: 2px dashed var(--border2);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(0, 112, 243, 0.04);
    }
    .upload-zone p {
      color: var(--text2);
      font-size: 14px;
      margin-top: 8px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }
    @media (max-width: 640px) {
      .options { grid-template-columns: 1fr; }
    }
    .result-box {
      margin-top: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: none;
    }
    .result-box a {
      word-break: break-all;
      font-family: monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container page-enter">
    <div class="header">
      <div class="logo glitch" data-text="HHost">H<span>Host</span></div>
      <div class="nav">
        {% if can_use_hashbin %}
        <a href="/hashbin" class="btn btn-ghost">HashBin</a>
        {% endif %}
        {% if is_admin %}
        <a href="/admin" class="btn btn-ghost">Admin</a>
        {% endif %}
        <a href="/account" class="btn btn-ghost">Conta</a>
        <span class="badge">{{ username }}</span>
        <a href="/logout" class="btn btn-ghost">Sair</a>
      </div>
    </div>

    <div class="card reveal">
      <h2>Enviar mídia</h2>
      <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Arraste ou selecione uma mídia para enviar.</p>

      <form id="uploadForm" enctype="multipart/form-data">
        <div class="upload-zone" id="dropZone">
          <div style="font-size:36px;color:var(--text2)">+</div>
          <p>Arraste a mídia aqui ou clique para selecionar</p>
          <input type="file" name="file" id="fileInput" style="display:none" accept="image/*,video/mp4,video/webm,audio/mpeg">
        </div>

        <div id="previewBox" style="display:none;margin-top:16px;text-align:center">
          <img id="previewImg" src="" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border)" alt="Preview">
        </div>

        <div class="options">
          <div class="form-group">
            <label>Título</label>
            <input type="text" name="title" placeholder="Título opcional">
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <input type="text" name="description" placeholder="Descrição opcional">
          </div>
          {% if can_choose_embed_color %}
          <div class="form-group">
            <label>Cor do embed</label>
            <div style="display:flex;align-items:center;gap:10px">
              <input type="color" name="embed_color" id="embedColor" value="#0070f3" style="flex:0">
              <div id="colorPreview" style="flex:1;height:32px;border-radius:6px;background:#0070f3;border:1px solid var(--border);transition:background 0.15s"></div>
            </div>
          </div>
          {% endif %}
          <div class="form-group">
            <label>Vida útil</label>
            <select name="file_lifetime">
              {% for opt in file_lifetime_options %}
                {% if opt.value in allowed_lifetimes %}
                <option value="{{ opt.value }}">{{ opt.label }}</option>
                {% endif %}
              {% endfor %}
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%">Enviar</button>
      </form>

      <div class="result-box" id="resultBox">
        <p style="font-size:14px;color:var(--text2);margin-bottom:8px">Mídia enviada:</p>
        <a id="resultLink" href="#"></a><br>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById('resultLink').href)">Copiar link</button>
      </div>
    </div>
  </div>

  <script>
    const dz = document.getElementById('dropZone');
    const fi = document.getElementById('fileInput');
    const embedColor = document.getElementById('embedColor');
    const colorPreview = document.getElementById('colorPreview');

    if (embedColor && colorPreview) {
      embedColor.addEventListener('input', () => {
        colorPreview.style.background = embedColor.value;
      });
    }

    dz.addEventListener('click', () => fi.click());

    dz.addEventListener('dragover', e => {
      e.preventDefault();
      dz.classList.add('dragover');
    });

    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));

    function showFileName(name) {
      dz.querySelector('p').innerHTML = name + ' <a href="#" id="resetFile" style="color:var(--accent);font-size:12px;margin-left:8px">Trocar</a>';
      document.getElementById('resetFile').addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        fi.value = '';
        dz.querySelector('p').textContent = 'Arraste a mídia aqui ou clique para selecionar';
        document.getElementById('previewBox').style.display = 'none';
      });
    }

    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragover');
      fi.files = e.dataTransfer.files;
      showFileName(fi.files[0].name);
      showPreview(fi.files[0]);
    });

    fi.addEventListener('change', () => {
      if (fi.files[0]) {
        showFileName(fi.files[0].name);
        showPreview(fi.files[0]);
      }
    });

    function showPreview(file) {
      const pb = document.getElementById('previewBox');
      const pi = document.getElementById('previewImg');
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => {
          pi.src = e.target.result;
          pb.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        pb.style.display = 'none';
      }
    }

    document.getElementById('uploadForm').addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      try {
        const r = await fetch('/upload', { method: 'POST', body: fd });
        const t = await r.text();
        if (r.ok) {
          document.getElementById('resultBox').style.display = 'block';
          const url = t.replace('Upload concluído: ', '');
          document.getElementById('resultLink').href = url;
          document.getElementById('resultLink').textContent = url;
        } else {
          alert(t);
        }
      } catch (err) {
        alert('Erro ao enviar');
      }
    });
  </script>

  <script src="/static/wavy-canvas.js"></script>
  <script src="/static/animations.js"></script>
</body>
</html>
