<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Alterar senha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container" style="max-width:420px">
    <div class="header">
      <a href="/dashboard" class="logo glitch" data-text="HHost">H<span>Host</span></a>
      <a href="/dashboard" class="btn btn-ghost">Voltar</a>
    </div>

    <div class="card reveal-scale">
      <h2 style="margin-bottom:24px">Alterar senha</h2>
      <form method="POST">
        <div class="form-group">
          <label>Senha atual</label>
          <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
          <label>Nova senha</label>
          <input type="password" name="new_password" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirmar nova senha</label>
          <input type="password" name="confirm_password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Alterar senha</button>
      </form>
    </div>
  </div>
</body>
<script src="/static/wavy-canvas.js"></script>
<script src="/static/animations.js"></script>
</html>
