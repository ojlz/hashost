<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Criar conta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px">
    <div style="width:100%;max-width:380px" class="reveal-scale">
      <div style="text-align:center;margin-bottom:40px">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:var(--accent);color:#fff;font-size:22px;font-weight:700;margin-bottom:16px">H</div>
        <h1 style="font-size:28px">HashHost</h1>
        <p style="color:var(--text2);font-size:14px;margin-top:4px">Armazenamento e compartilhamento de arquivos</p>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" name="username" required autofocus placeholder="seu-usuario">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" name="password" required placeholder="sua-senha">
        </div>
        <div class="form-group">
          <label>Codigo de convite</label>
          <input type="text" name="invite_code" placeholder="Opcional - se tiver um codigo">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Criar conta</button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--text2)">Ja tem uma conta? <a href="/login">Entrar</a></p>
    </div>
  </div>
</body>
<script src="/static/wavy-canvas.js"></script>
<script src="/static/animations.js"></script>
</html>
