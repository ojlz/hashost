<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>HashHost - Criar conta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px">
    <div style="width:100%;max-width:380px" class="reveal-scale">
      <div style="text-align:center;margin-bottom:40px">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:12px;background:var(--accent);color:#fff;font-size:22px;font-weight:700;margin-bottom:16px">H</div>
        <h1 style="font-size:28px">HashHost</h1>
        <p style="color:var(--text2);font-size:14px;margin-top:4px">Armazenamento e compartilhamento de arquivos</p>
      </div>

      {% if error %}
      <div class="error" role="alert">{{ error }}</div>
      {% endif %}

      {% if inviter %}
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:var(--text2)">
        Você foi convidado por <strong style="color:var(--text1)">{{ inviter }}</strong>
      </div>
      {% endif %}

      <form method="POST" action="/signup">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" name="username" required autofocus placeholder="3-16 caracteres, apenas letras, numeros e _">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" name="password" required placeholder="6-32 caracteres">
          <p style="color:var(--text2);font-size:11px;margin-top:4px">Minimo 6, maximo 32 caracteres</p>
        </div>
        {% if invite_code %}
        <div class="form-group">
          <label>Código de convite</label>
          <input type="text" name="invite_code" value="{{ invite_code }}" readonly style="opacity:0.7;cursor:not-allowed">
        </div>
        {% else %}
        <div class="form-group">
          <label>Código de convite</label>
          <input type="text" name="invite_code" placeholder="Opcional - se tiver um código">
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Criar conta</button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--text2)">Já tem uma conta? <a href="/login">Entrar</a></p>
    </div>
  </div>

  <script src="/static/wavy-canvas.js"></script>
  <script src="/static/animations.js"></script>
</body>
</html>
